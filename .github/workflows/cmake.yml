name: CMake Build

on:
  push:
    branches: [ "master", "main", "dev", "setup-cicd" ]
  pull_request:
    branches: [ "master", "main", "dev" ]

permissions:
  packages: write
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}-build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            preset: release
          - os: windows-latest
            preset: release
          - os: macos-latest
            preset: release

    env:
      BUILD_TYPE: Release
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ninja-build \
          pkg-config \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          mesa-common-dev \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libx11-xcb-dev \
          libxext-dev \
          libxfixes-dev \
          libxi-dev \
          libxtst-dev \
          libxcb1-dev \
          libxcb-glx0-dev \
          libxcb-keysyms1-dev \
          libxcb-image0-dev \
          libxcb-shm0-dev \
          libxcb-icccm4-dev \
          libxcb-sync-dev \
          libxcb-xfixes0-dev \
          libxcb-shape0-dev \
          libxcb-randr0-dev \
          libxcb-render-util0-dev \
          libxcb-xinerama-dev \
          libxcb-image0-dev \
          libxrender-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev \
          mold \
          autoconf \
          autoconf-archive \
          automake \
          libtool \
          libltdl-dev \
          mono-complete

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: brew install libomp mono autoconf autoconf-archive automake libtool

    - name: Setup vcpkg (lukka/run-vcpkg)
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 25b458671af03578e6a34edd8f0d1ac85e084df4 # Matches builtin-baseline in vcpkg.json
        vcpkgJsonGlob: 'vcpkg.json'

    - name: Setup NuGet Credentials (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $nuget = $(vcpkg fetch nuget | Select-Object -Last 1)
        & $nuget sources add `
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
          -StorePasswordInClearText `
          -Name GitHubPackages `
          -UserName "${{ github.repository_owner }}" `
          -Password "${{ secrets.GITHUB_TOKEN }}"
        & $nuget setapikey "${{ secrets.GITHUB_TOKEN }}" `
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

    - name: Setup NuGet Credentials (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        nuget_exe=$(vcpkg fetch nuget | tail -n 1)
        mono "$nuget_exe" \
          sources add \
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          -StorePasswordInClearText \
          -Name GitHubPackages \
          -UserName "${{ github.repository_owner }}" \
          -Password "${{ secrets.GITHUB_TOKEN }}" || true
        mono "$nuget_exe" \
          setapikey "${{ secrets.GITHUB_TOKEN }}" \
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

    - name: Setup NuGet Credentials (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        nuget_exe=$(vcpkg fetch nuget | grep "nuget.exe" | tail -n 1)
        echo "Found nuget at: $nuget_exe"
        mono "$nuget_exe" \
          sources add \
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          -StorePasswordInClearText \
          -Name GitHubPackages \
          -UserName "${{ github.repository_owner }}" \
          -Password "${{ secrets.GITHUB_TOKEN }}" || true
        mono "$nuget_exe" \
          setapikey "${{ secrets.GITHUB_TOKEN }}" \
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Configure CMake
      run: cmake --preset ${{ matrix.preset }}

    - name: Build
      run: cmake --build --preset ${{ matrix.preset }}

    # Tests will be added later when the test framework is set up
    # - name: Test
    #   run: ctest --preset ${{ matrix.preset }}
