name: CMake Build

on:
  push:
    branches: [ "master", "main", "dev", "setup-cicd" ]
  pull_request:
    branches: [ "master", "main", "dev" ]

permissions:
  packages: write
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}-build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            preset: release
            triplet: x64-linux
            generator: "Unix Makefiles"
          - os: windows-latest
            preset: release
            triplet: x64-mingw-dynamic
            generator: "MinGW Makefiles"
          - os: macos-latest
            preset: release
            triplet: arm64-osx
            generator: "Unix Makefiles"

    env:
      BUILD_TYPE: Release
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,${{ github.event_name == 'pull_request' && 'read' || 'readwrite' }}"
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      VCPKG_NUGET_TIMEOUT: 600
      VCPKG_TARGET_TRIPLET: ${{ matrix.triplet }}
      CMAKE_GENERATOR: ${{ matrix.generator }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSYS2 (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-make
          mingw-w64-x86_64-pkgconf

    - name: Free Disk Space (Linux)
      if: runner.os == 'Linux'
      run: |
        echo "Disk space before cleanup:"
        df -h /
        # Remove large pre-installed packages we don't need
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/share/swift
        echo "Disk space after cleanup:"
        df -h /

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources
        sudo apt-get update
        sudo apt-get build-dep -y qtbase5-dev
        sudo apt-get install -y \
          ninja-build \
          mold \
          autoconf \
          autoconf-archive \
          automake \
          libtool \
          libltdl-dev \
          mono-complete

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: brew install libomp mono autoconf autoconf-archive automake libtool

    - name: Setup vcpkg (lukka/run-vcpkg)
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 25b458671af03578e6a34edd8f0d1ac85e084df4 # Matches builtin-baseline in vcpkg.json
        vcpkgJsonGlob: 'vcpkg.json'

    - name: Setup NuGet Credentials (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $nuget = $(vcpkg fetch nuget | Select-Object -Last 1)
        & $nuget sources add `
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
          -StorePasswordInClearText `
          -Name GitHubPackages `
          -UserName "${{ github.repository_owner }}" `
          -Password "${{ secrets.GITHUB_TOKEN }}"
        & $nuget setapikey "${{ secrets.GITHUB_TOKEN }}" `
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

    - name: Setup NuGet Credentials (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        nuget_exe=$(vcpkg fetch nuget | tail -n 1)
        mono "$nuget_exe" \
          sources add \
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          -StorePasswordInClearText \
          -Name GitHubPackages \
          -UserName "${{ github.repository_owner }}" \
          -Password "${{ secrets.GITHUB_TOKEN }}" || true
        mono "$nuget_exe" \
          setapikey "${{ secrets.GITHUB_TOKEN }}" \
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

    - name: Download NuGet (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        curl -sSL -o "$RUNNER_TEMP/nuget.exe" https://dist.nuget.org/win-x86-commandline/latest/nuget.exe
        echo "NUGET=$RUNNER_TEMP/nuget.exe" >> "$GITHUB_ENV"

    - name: Provide working 'nuget' on PATH (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        cp "$NUGET" "$RUNNER_TEMP/nuget"
        chmod +x "$RUNNER_TEMP/nuget"
        echo "PATH=$RUNNER_TEMP:$PATH" >> "$GITHUB_ENV"

    - name: Setup NuGet Credentials (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        mono "$NUGET" sources remove -Name GitHubPackages -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" || true
        mono "$NUGET" sources add -Name GitHubPackages -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          -Username "${{ github.repository_owner }}" \
          -Password "${{ secrets.GITHUB_TOKEN }}" \
          -StorePasswordInClearText
        if [[ "${{ github.event_name }}" != "pull_request" ]]; then
          mono "$NUGET" setapikey "${{ secrets.GITHUB_TOKEN }}" -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
        fi

    - name: Setup CMake
      if: runner.os != 'Windows'
      uses: lukka/get-cmake@latest

    - name: Show vcpkg triplet + installed packages (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        echo "VCPKG_DEFAULT_TRIPLET=$env:VCPKG_DEFAULT_TRIPLET"
        echo "VCPKG_TARGET_TRIPLET=$env:VCPKG_TARGET_TRIPLET"
        vcpkg list --triplet ${{ matrix.triplet }}

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: cmake --preset ${{ matrix.preset }}

    - name: Configure CMake (Non-Windows)
      if: runner.os != 'Windows'
      run: cmake --preset ${{ matrix.preset }}

    - name: Build (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: cmake --build --preset ${{ matrix.preset }}

    - name: Build (Non-Windows)
      if: runner.os != 'Windows'
      run: cmake --build --preset ${{ matrix.preset }}

    - name: Install (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: cmake --install build/${{ matrix.preset }} --prefix build/installed

    - name: Bundle DLLs + Qt (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        WINDEPLOYQT: ${{ github.workspace }}\vcpkg_installed\${{ matrix.triplet }}\tools\qt5\bin\windeployqt.exe
      run: |
        New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\build\installed\bin" | Out-Null
        Copy-Item "$env:GITHUB_WORKSPACE\vcpkg_installed\${{ matrix.triplet }}\bin\*.dll" "$env:GITHUB_WORKSPACE\build\installed\bin" -Force
        & "$env:WINDEPLOYQT" --verbose 2 --qmldir "$env:GITHUB_WORKSPACE\filmulator-gui\qml\filmulator-gui" "$env:GITHUB_WORKSPACE\build\installed\bin\filmulator.exe"
        Copy-Item "$env:GITHUB_WORKSPACE\LICENSE.txt" "$env:GITHUB_WORKSPACE\build\installed\bin" -Force
        Copy-Item "$env:GITHUB_WORKSPACE\filmulator-gui\filmulator-gui80.ico" "$env:GITHUB_WORKSPACE\build\installed\bin" -Force
        Copy-Item "$env:GITHUB_WORKSPACE\filmulator_build.iss" "$env:GITHUB_WORKSPACE\build\installed" -Force

    - name: Upload Windows Artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: filmulator-windows
        path: build/installed

    # Tests will be added later when the test framework is set up
    # - name: Test
    #   run: ctest --preset ${{ matrix.preset }}
