name: CMake Build

on:
  push:
    branches: [ "master", "main", "dev", "setup-cicd" ]
  pull_request:
    branches: [ "master", "main", "dev" ]

permissions:
  packages: write
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}-build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            preset: release
            triplet: x64-linux
            generator: "Unix Makefiles"
          - os: windows-latest
            preset: release
            triplet: x64-mingw-dynamic
            generator: "MinGW Makefiles"
          - os: macos-latest
            preset: release
            triplet: arm64-osx
            generator: "Unix Makefiles"

    env:
      BUILD_TYPE: Release
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,${{ github.event_name == 'pull_request' && 'read' || 'readwrite' }}"
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      VCPKG_NUGET_TIMEOUT: 600
      VCPKG_TARGET_TRIPLET: ${{ matrix.triplet }}
      CMAKE_GENERATOR: ${{ matrix.generator }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Free Disk Space (Linux)
      if: runner.os == 'Linux'
      run: |
        echo "Disk space before cleanup:"
        df -h /
        # Remove large pre-installed packages we don't need
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/share/swift
        echo "Disk space after cleanup:"
        df -h /

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources
        sudo apt-get update
        sudo apt-get build-dep -y qtbase5-dev
        sudo apt-get install -y \
          ninja-build \
          mold \
          autoconf \
          autoconf-archive \
          automake \
          libtool \
          libltdl-dev \
          mono-complete

    - name: Install macOS Dependencies
      if: runner.os == 'macOS'
      run: brew install libomp mono autoconf autoconf-archive automake libtool

    - name: Install pkg-config (Windows)
      if: runner.os == 'Windows'
      run: choco install pkgconfiglite

    - name: Setup vcpkg (lukka/run-vcpkg)
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 25b458671af03578e6a34edd8f0d1ac85e084df4 # Matches baseline in vcpkg-configuration.json
        vcpkgJsonGlob: 'vcpkg.json'

    - name: Setup NuGet Credentials (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $nuget = $(vcpkg fetch nuget | Select-Object -Last 1)
        & $nuget sources add `
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
          -StorePasswordInClearText `
          -Name GitHubPackages `
          -UserName "${{ github.repository_owner }}" `
          -Password "${{ secrets.GITHUB_TOKEN }}"
        & $nuget setapikey "${{ secrets.GITHUB_TOKEN }}" `
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

    - name: Download NuGet (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        curl -sSL -o "$RUNNER_TEMP/nuget.exe" https://dist.nuget.org/win-x86-commandline/latest/nuget.exe
        echo "NUGET_EXE=$RUNNER_TEMP/nuget.exe" >> "$GITHUB_ENV"

    - name: Provide working 'nuget' on PATH (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        cp "$NUGET_EXE" "$RUNNER_TEMP/nuget"
        chmod +x "$RUNNER_TEMP/nuget"
        echo "PATH=$RUNNER_TEMP:$PATH" >> "$GITHUB_ENV"

    - name: Find NuGet (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        nuget_path=$(vcpkg fetch nuget | tail -n 1)
        echo "NUGET_EXE=$nuget_path" >> "$GITHUB_ENV"

    - name: Setup NuGet Credentials (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        mono "$NUGET_EXE" sources remove -Name GitHubPackages -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" || true
        mono "$NUGET_EXE" sources add \
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          -StorePasswordInClearText \
          -Name GitHubPackages \
          -UserName "${{ github.repository_owner }}" \
          -Password "${{ secrets.GITHUB_TOKEN }}"
        mono "$NUGET_EXE" setapikey "${{ secrets.GITHUB_TOKEN }}" \
          -Source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Configure CMake
      run: cmake --preset ${{ matrix.preset }} -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}

    - name: Build
      run: cmake --build --preset ${{ matrix.preset }}

    - name: Install (Windows)
      if: runner.os == 'Windows'
      run: cmake --install build/${{ matrix.preset }} --prefix build/installed

    - name: Bundle DLLs + Qt (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        # vcpkg manifest mode puts dependencies and tools inside the build directory
        WINDEPLOY_PREFIX: ${{ github.workspace }}\build\${{ matrix.preset }}\vcpkg_installed\${{ matrix.triplet }}
      run: |
        $binDir = "$env:GITHUB_WORKSPACE\build\installed\bin"
        $vcpkgBinDir = "$env:WINDEPLOY_PREFIX\bin"
        
        Write-Host "Bundling DLLs from $vcpkgBinDir to $binDir"
        if (Test-Path $vcpkgBinDir) {
            Copy-Item "$vcpkgBinDir\*.dll" $binDir -Force
        } else {
            Write-Error "Could not find vcpkg bin directory at $vcpkgBinDir"
            exit 1
        }

        Write-Host "Looking for windeployqt..."
        # Check multiple possible locations for windeployqt
        $possiblePaths = @(
            "$env:WINDEPLOY_PREFIX\tools\qt5\bin\windeployqt.exe",
            "$env:WINDEPLOY_PREFIX\tools\qt5-tools\bin\windeployqt.exe",
            "$vcpkgBinDir\windeployqt.exe"
        )
        
        $windeployqt = $null
        foreach ($path in $possiblePaths) {
            Write-Host "Checking: $path"
            if (Test-Path $path) {
                $windeployqt = $path
                Write-Host "Found windeployqt at: $windeployqt"
                break
            }
        }
        
        if (-not $windeployqt) {
            Write-Host "Could not find windeployqt in expected locations. Searching entire vcpkg directory..."
            $found = Get-ChildItem -Path "$env:WINDEPLOY_PREFIX" -Recurse -Filter "windeployqt.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
                $windeployqt = $found.FullName
                Write-Host "Found windeployqt at: $windeployqt"
            } else {
                Write-Error "Could not find windeployqt.exe anywhere in vcpkg installation"
                Write-Host "Contents of vcpkg tools directory:"
                if (Test-Path "$env:WINDEPLOY_PREFIX\tools") {
                    Get-ChildItem -Path "$env:WINDEPLOY_PREFIX\tools" -Recurse | Select-Object FullName
                }
                exit 1
            }
        }

        Write-Host "Running windeployqt..."
        & $windeployqt --verbose 2 --qmldir "$env:GITHUB_WORKSPACE\filmulator-gui\qml\filmulator-gui" "$binDir\filmulator.exe"
        
        Copy-Item "$env:GITHUB_WORKSPACE\LICENSE.txt" $binDir -Force
        Copy-Item "$env:GITHUB_WORKSPACE\filmulator-gui\filmulator-gui80.ico" $binDir -Force
        Copy-Item "$env:GITHUB_WORKSPACE\filmulator_build.iss" "$env:GITHUB_WORKSPACE\build\installed" -Force

    - name: Upload Windows Artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: filmulator-windows
        path: build/installed

    # Tests will be added later when the test framework is set up
    # - name: Test
    #   run: ctest --preset ${{ matrix.preset }}
